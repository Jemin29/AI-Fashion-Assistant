# =============================================================================
# logging_config.yaml
# Loguru-Based Structured Logging Configuration — Week 2
# =============================================================================

logging:
  # ── Global Level ───────────────────────────────────────────────────────────
  # DEBUG | INFO | SUCCESS | WARNING | ERROR | CRITICAL
  level: INFO

  # ── Console (stderr) Sink ──────────────────────────────────────────────────
  console:
    enabled: true
    level: INFO
    colorize: true
    format: >
      <green>{time:YYYY-MM-DD HH:mm:ss}</green> |
      <level>{level: <8}</level> |
      <cyan>{name}</cyan>:<cyan>{function}</cyan>:<cyan>{line}</cyan> -
      <level>{message}</level>

  # ── File Sink — General ────────────────────────────────────────────────────
  file:
    enabled: true
    level: DEBUG
    path: week2/logs/week2_{time:YYYY-MM-DD}.log
    rotation: 10 MB               # Rotate when file exceeds 10 MB
    retention: 7 days             # Delete logs older than 7 days
    compression: gz               # Compress rotated files
    encoding: utf-8
    format: >
      {time:YYYY-MM-DD HH:mm:ss.SSS} |
      {level: <8} |
      {name}:{function}:{line} |
      {message}

  # ── File Sink — Errors Only ────────────────────────────────────────────────
  error_file:
    enabled: true
    level: ERROR
    path: week2/logs/errors_{time:YYYY-MM-DD}.log
    rotation: 5 MB
    retention: 30 days
    compression: gz
    encoding: utf-8

  # ── File Sink — Generation Events ─────────────────────────────────────────
  generation_file:
    enabled: true
    level: INFO
    path: week2/logs/generation_{time:YYYY-MM-DD}.log
    rotation: 20 MB
    retention: 14 days
    compression: gz
    encoding: utf-8
    # Only records tagged with "generation" filter
    filter: "generation"

  # ── Structured JSON Sink (for log aggregation / dashboards) ───────────────
  json_file:
    enabled: false                # Enable for production log aggregation
    level: INFO
    path: week2/logs/structured_{time:YYYY-MM-DD}.jsonl
    rotation: 50 MB
    retention: 30 days
    serialize: true               # Emit JSON Lines format

# ── Module-Level Overrides ─────────────────────────────────────────────────
module_levels:
  # Silence verbose third-party libraries
  diffusers: WARNING
  transformers: WARNING
  torch: WARNING
  PIL: WARNING
  urllib3: WARNING
  filelock: WARNING
