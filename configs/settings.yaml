# =============================================================================
# AI-Powered Fashion Design Assistant
# configs/settings.yaml — Master Configuration File for Week 1
# =============================================================================
# This file defines all configurable parameters for the Week 1 pipeline.
# Values here act as defaults; they are overridden by corresponding .env values.
# =============================================================================

project:
  name: "AI Fashion Design Assistant"
  version: "1.0.0"
  week: 1
  description: "Fashion Domain Research & Dataset Curation"
  authors:
    - name: "Fashion AI Team"
  environment: "development"  # development | staging | production

# ─── Dataset Configurations ───────────────────────────────────────────────────
datasets:
  fashiongen:
    name: "FashionGen"
    description: >
      Large-scale fashion dataset with 293,000 high-resolution images paired
      with rich natural-language descriptions generated by human annotators.
    source_url: "https://fashion-gen.com/"
    format: "hdf5"
    hdf5_keys:
      images: "input_image"
      descriptions: "input_description"
      categories: "input_category"
      gender: "input_gender"
      subcategories: "input_subcategory"
    splits:
      train:
        file: "fashiongen_256_256_train.h5"
        size: 260480
      val:
        file: "fashiongen_256_256_val.h5"
        size: 32500
    target_resolution: [256, 256]
    color_mode: "RGB"

  deepfashion:
    name: "DeepFashion"
    description: >
      Large-scale fashion benchmark with 800,000+ images covering 50 categories
      with rich annotations: bounding boxes, landmarks, attributes, and pairs.
    source_url: "https://liuziwei7.github.io/projects/DeepFashion.html"
    format: "image_folder"
    splits:
      train:
        annotation_file: "Anno/list_attr_img.txt"
      val:
        annotation_file: "Anno/list_attr_img.txt"
    category_file: "Anno/list_category_img.txt"
    attribute_file: "Anno/list_attr_cloth.txt"
    bbox_file: "Anno/list_bbox.txt"
    landmark_file: "Anno/list_landmarks.txt"
    num_categories: 50
    num_attributes: 1000

# ─── Data Pipeline Configuration ──────────────────────────────────────────────
pipeline:
  ingestion:
    max_retries: 3               # Retry failed downloads
    timeout_seconds: 300         # Per-request timeout
    chunk_size_mb: 8             # Streaming download chunk size
    verify_checksum: true        # Validate file integrity after download

  preprocessing:
    target_size: [256, 256]      # Output image dimensions (H, W)
    color_mode: "RGB"            # RGB | RGBA | L (grayscale)
    image_format: "JPEG"         # JPEG | PNG | WEBP
    jpeg_quality: 95             # JPEG quality (1-100)
    normalize:
      enabled: true
      mean: [0.485, 0.456, 0.406]  # ImageNet mean (R, G, B)
      std: [0.229, 0.224, 0.225]   # ImageNet std (R, G, B)
    augmentation:
      enabled: false             # Disabled in Week 1 (raw curation only)

  validation:
    min_width: 64                # Minimum acceptable image width (px)
    min_height: 64               # Minimum acceptable image height (px)
    max_file_size_mb: 50         # Maximum image file size
    allowed_formats: ["JPEG", "PNG", "WEBP"]
    require_description: true    # Reject images without text descriptions
    min_description_length: 10   # Minimum character count for descriptions
    corruption_check: true       # Detect and quarantine corrupt images

  metadata_generation:
    clip_model: "ViT-B/32"       # CLIP model for visual embeddings
    text_model: "all-MiniLM-L6-v2"  # Sentence transformer for text
    batch_size: 32               # Images per embedding batch
    save_embeddings: true        # Persist embeddings to disk
    embedding_format: "parquet"  # parquet | npy | hdf5

# ─── Output Schema ────────────────────────────────────────────────────────────
metadata_schema:
  # Every processed item must have these fields
  required_fields:
    - image_id          # Unique identifier (string)
    - dataset_source    # fashiongen | deepfashion
    - original_path     # Path to source file
    - processed_path    # Path to preprocessed file
    - width             # Image width (int)
    - height            # Image height (int)
    - color_mode        # RGB | RGBA | L
    - file_size_bytes   # File size (int)
    - description       # Human-readable text description
    - category          # Top-level category (e.g., tops, bottoms)
    - gender            # men | women | unisex | unknown
    - split             # train | val | test
    - is_valid          # Boolean — passed all validation checks
    - created_at        # ISO-8601 timestamp of processing

  optional_fields:
    - subcategory       # Fine-grained subcategory
    - attributes        # List of fashion attributes
    - bbox              # Bounding box [x1, y1, x2, y2]
    - landmarks         # Keypoint coordinates
    - clip_embedding_path  # Path to saved CLIP embedding
    - text_embedding_path  # Path to saved text embedding
    - quality_score     # Computed image quality (0.0 – 1.0)

# ─── Logging Configuration ────────────────────────────────────────────────────
logging:
  level: "INFO"                  # DEBUG | INFO | WARNING | ERROR | CRITICAL
  directory: "./logs"
  format: "{time:YYYY-MM-DD HH:mm:ss} | {level:<8} | {name}:{line} — {message}"
  rotation: "10 MB"              # Rotate when file exceeds 10 MB
  retention: "30 days"           # Delete logs older than 30 days
  colorize: true                 # Color terminal output

# ─── Compute Configuration ────────────────────────────────────────────────────
compute:
  device: "auto"                 # auto | cpu | cuda | mps
  num_workers: 4                 # DataLoader worker threads
  pin_memory: false              # Enable for GPU acceleration
  mixed_precision: false         # FP16 inference (GPU only)
