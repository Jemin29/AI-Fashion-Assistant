# ControlNet settings for Style and Structure Conditioning
controlnet:
  enabled: true
  
  # Default ControlNet model mapping (can be overridden)
  model_id: "diffusers/controlnet-canny-sdxl-1.0"
  
  # Influence factor of ControlNet on final generation (0.0 to 1.0)
  conditioning_scale: 0.8
  
  # Denoising timesteps range where ControlNet is applied (0.0 = start, 1.0 = end)
  control_guidance_start: 0.0
  control_guidance_end: 1.0

# Preprocessor specifications
preprocessors:
  # Canny edge detector configuration
  canny:
    low_threshold: 100
    high_threshold: 200
    resolution: 1024
    
  # Openpose pose estimator configuration
  openpose:
    detect_hand_and_face: true
    resolution: 1024
    
  # Depth estimator configuration
  depth:
    model_type: "dpt_hybrid"
    resolution: 1024

# Output folder for processed edge maps or pose estimations
output_dir: "week3/outputs/preprocessed"
