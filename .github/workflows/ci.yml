name: CI — AI Fashion Design Assistant

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Lint ──────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Style Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pycodestyle

      - name: Run flake8
        run: |
          flake8 src/ --max-line-length=120 --extend-ignore=E203,W503 --count --statistics
        continue-on-error: true   # advisory only — does not fail the build

  # ── Unit Tests ────────────────────────────────────────────────────────────────
  test:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-subtests

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ \
            --cov=src \
            --cov-fail-under=80 \
            --cov-report=xml \
            --cov-report=term-missing \
            --strict-markers \
            -q

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # ── Build Check ───────────────────────────────────────────────────────────────
  build:
    name: Package Build Check
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install build tools
        run: pip install build wheel setuptools

      - name: Build package
        run: python -m build --sdist

      - name: Verify importable
        run: |
          pip install -e .
          python -c "import src; print('src package OK')"
