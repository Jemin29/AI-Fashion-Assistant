version: '3.8'

services:
  # Redis: Task broker and configuration cache
  redis:
    image: redis:7-alpine
    container_name: fashion-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - fashion-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  # ChromaDB: Standalone vector database server
  chromadb:
    image: chromadb/chroma:0.5.0
    container_name: fashion-chromadb
    ports:
      - "8000:8000"
    volumes:
      - chromadb_data:/chroma/data
    networks:
      - fashion-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/heartbeat || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  # FastAPI: REST API backend service
  fastapi-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fashion-api
    command: uvicorn week7.backend.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8001:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CHROMA_SERVER_HOST=chromadb
      - CHROMA_SERVER_PORT=8000
      - ENV=production
      - GLOBAL_MOCK=True
    depends_on:
      redis:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    volumes:
      - app_outputs:/app/outputs
      - app_logs:/app/logs
    networks:
      - fashion-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
    restart: always

  # Gradio UI: Interactive web designer dashboard
  gradio-ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fashion-ui
    command: python apps/gradio_app/app.py
    ports:
      - "7860:7860"
    environment:
      - BACKEND_API_URL=http://fastapi-api:8000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ENV=production
    depends_on:
      - fastapi-api
    volumes:
      - app_outputs:/app/outputs
    networks:
      - fashion-network
    restart: always

  # Celery Worker: Asynchronous Stable Diffusion and ML inference worker
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fashion-worker
    command: celery -A week7.backend.workers.celery_app worker --loglevel=info -Q inference -c 1
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ENV=production
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - app_outputs:/app/outputs
      - app_logs:/app/logs
    networks:
      - fashion-network
    restart: always

  # Celery Beat: Dynamic schedule trigger for cleanup and stats aggregations
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fashion-beat
    command: celery -A week7.backend.workers.celery_app beat --loglevel=info
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ENV=production
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - app_outputs:/app/outputs
    networks:
      - fashion-network
    restart: always

networks:
  fashion-network:
    name: fashion-network
    driver: bridge

volumes:
  redis_data:
  chromadb_data:
  app_outputs:
  app_logs:
