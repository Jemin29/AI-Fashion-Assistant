# =============================================================================
# AI-Powered Fashion Design Assistant
# pytest.ini — Pytest Configuration
# =============================================================================
[pytest]
# Directories pytest will search for test files
testpaths = tests

# File naming convention for test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Default flags applied to every pytest run
addopts =
    --strict-markers
    --tb=short
    -q

# Suppress third-party deprecation warnings from test output
filterwarnings =
    ignore::DeprecationWarning:pkg_resources
    ignore::DeprecationWarning:torch
    ignore::UserWarning:torchvision

# Custom markers (declare all custom pytest.mark.X here to avoid warnings)
markers =
    slow: marks tests as slow (deselect with: pytest -m "not slow")
    integration: marks tests that require real dataset files
    gpu: marks tests requiring CUDA GPU
