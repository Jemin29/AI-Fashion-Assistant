apiVersion: v1
kind: PersistentVolume
metadata:
  name: fashion-assistant-pv
  labels:
    app: fashion-assistant
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual
  # Use hostPath for compatibility with local cluster runners like Minikube and K3s
  hostPath:
    path: "/data/fashion-assistant-storage"
