apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fashion-assistant-ingress
  namespace: fashion-ai
  labels:
    app: fashion-assistant
    version: "1.0.0"
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  ingressClassName: nginx
  rules:
    # Gradio UI
    - host: fashion.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fashion-gradio-service
                port:
                  number: 7860
    # FastAPI backend
    - host: api.fashion.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fashion-api-service
                port:
                  number: 8000
