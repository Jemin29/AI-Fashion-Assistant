apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fashion-api-hpa
  namespace: fashion-ai
  labels:
    app: fashion-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fashion-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80

---

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fashion-ui-hpa
  namespace: fashion-ai
  labels:
    app: fashion-ui
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fashion-ui
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
