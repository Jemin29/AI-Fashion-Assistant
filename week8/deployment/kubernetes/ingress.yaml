apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fashion-assistant-ingress
  namespace: fashion-ai
  labels:
    app: fashion-assistant
    version: "1.0.0"
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  rules:
    # External route targeting Gradio Web Portal dashboard
    - host: fashion.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fashion-ui-service
                port:
                  number: 7860
    # External route targeting FastAPI REST endpoints
    - host: api.fashion.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fashion-api-service
                port:
                  number: 8000
